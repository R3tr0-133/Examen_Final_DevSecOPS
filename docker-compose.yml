services:
  api:
    build: .
    ports:
      - "5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - FLASK_ENV=development
    depends_on:
      - redis
    networks:
      - taskflow-net

  redis:
    image: redis:7-alpine
    networks:
      - taskflow-net

networks:
  taskflow-net:
    driver: bridge